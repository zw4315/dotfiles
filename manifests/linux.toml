# =============================================================================
# Linux 安装清单
# =============================================================================
# 用法：把想装的 App 设为 true，不想装的设为 false 或注释掉。
# 修改后保存，运行 ./init.sh 即可生效。
# 查看所有可用 App：./init.sh --list-apps
# 检查当前状态：./init.sh --check
# =============================================================================

[core]
bash   = true   # Shell 配置
git    = true   # Git 版本控制
ssh    = true   # SSH 客户端配置
zoxide = true   # 智能目录跳转

[editor]
nvim = true   # Neovim 编辑器
vim  = true   # 传统 Vim 编辑器
tmux = true   # 终端复用器

[search]
fd  = true   # 替代 find
rg  = true   # 替代 grep，递归搜索
fzf = true   # 命令行模糊查找

# === 语言环境（按需开启）===
# 以下工具默认关闭。如果你有对应开发需求，请改为 true。
[language]
go     = false   # Go 语言
node   = false   # Node.js via nvm
python = false   # Python via uv
rust   = false   # Rust via rustup

# === 开发工具（按需开启）===
[devtool]
ctags        = false   # Universal Ctags 代码标签
global       = false   # GNU Global 代码导航
clang-format = false   # 代码格式化

# === 代理工具 ===
[proxy]
mihomo = false   # Mihomo (Clash.Meta) 代理
